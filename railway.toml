[railway]
language = "python"

[build]
builder = "NIXPACKS"

[deploy]
region = "us-west1"
numReplicas = 1

[deploy.healthbeatPath]
path = "/"
interval = 30

[settings]
persistentDirectories = ["/app/data"]

[env]
PYTHONUNBUFFERED = "1"
PORT = "8000"
RAILWAY_NIXPACKS_JSON = '{"instructions": "COPY . .\\nRUN pip install --no-cache-dir -r requirements.txt\\nCMD uvicorn app.main:app --host 0.0.0.0 --port $PORT"}'